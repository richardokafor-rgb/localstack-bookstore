name: CI/CD — LocalStack Bookstore

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_DEFAULT_REGION: us-east-1
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test

jobs:
  infra:
    name: Terraform apply (LocalStack)
    runs-on: ubuntu-latest

    services:
      localstack:
        image: localstack/localstack-pro:latest
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
          EAGER_SERVICE_LOADING: 1
          DOCKER_HOST: unix:///var/run/docker.sock
        ports:
          - 4566:4566
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15
          -v /var/run/docker.sock:/var/run/docker.sock

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.8"

      - name: Install tflocal + awslocal
        run: pip install terraform-local awscli-local

      - name: Install Node.js (Lambda build)
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Lambda dependencies
        working-directory: services/catalog-api
        run: npm install --production --silent

      - name: tflocal init
        working-directory: infrastructure/terraform
        run: tflocal init

      - name: tflocal apply
        working-directory: infrastructure/terraform
        run: tflocal apply -auto-approve

      - name: Export Terraform outputs
        id: tf_outputs
        working-directory: infrastructure/terraform
        run: |
          echo "api_endpoint=$(tflocal output -raw api_endpoint)" >> $GITHUB_OUTPUT
          echo "order_queue_url=$(tflocal output -raw order_queue_url)" >> $GITHUB_OUTPUT
          echo "books_table=$(tflocal output -raw books_table)" >> $GITHUB_OUTPUT

      - name: Upload tf outputs artifact
        uses: actions/upload-artifact@v4
        with:
          name: tf-outputs
          path: infrastructure/terraform/terraform.tfstate

  test:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: infra

    services:
      localstack:
        image: localstack/localstack-pro:latest
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
          EAGER_SERVICE_LOADING: 1
          DOCKER_HOST: unix:///var/run/docker.sock
        ports:
          - 4566:4566
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15
          -v /var/run/docker.sock:/var/run/docker.sock

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Terraform + tflocal
        run: |
          pip install terraform-local awscli-local pytest boto3 requests
          wget -q https://releases.hashicorp.com/terraform/1.8.5/terraform_1.8.5_linux_amd64.zip
          unzip -q terraform_1.8.5_linux_amd64.zip && sudo mv terraform /usr/local/bin/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Reapply infrastructure
        working-directory: infrastructure/terraform
        run: |
          tflocal init
          tflocal apply -auto-approve

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Run integration tests
        env:
          AWS_ENDPOINT_URL: http://localhost:4566
          BOOKS_TABLE: local-books
          ORDERS_TABLE: local-orders
          USERS_TABLE: local-users
        run: pytest tests/integration/ -v --tb=short

  mcp-validate:
    name: MCP skill validation
    runs-on: ubuntu-latest
    needs: test

    services:
      localstack:
        image: localstack/localstack-pro:latest
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
          EAGER_SERVICE_LOADING: 1
          DOCKER_HOST: unix:///var/run/docker.sock
        ports:
          - 4566:4566
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15
          -v /var/run/docker.sock:/var/run/docker.sock

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Terraform + tflocal
        run: |
          pip install terraform-local awscli-local
          wget -q https://releases.hashicorp.com/terraform/1.8.5/terraform_1.8.5_linux_amd64.zip
          unzip -q terraform_1.8.5_linux_amd64.zip && sudo mv terraform /usr/local/bin/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Deploy infrastructure
        working-directory: infrastructure/terraform
        run: |
          tflocal init
          tflocal apply -auto-approve

      - name: Install MCP skill dependencies
        working-directory: services/mcp-skill
        run: pip install -r requirements.txt

      - name: Validate MCP tools are loadable
        working-directory: services/mcp-skill
        env:
          MCP_API_ENDPOINT: http://localhost:4566
          ORDER_SERVICE_URL: http://localhost:5000
          AWS_ENDPOINT_URL: http://localhost:4566
        run: |
          python -c "
          import asyncio, sys
          sys.path.insert(0, '.')
          from server import app, list_tools
          tools = asyncio.run(list_tools())
          names = [t.name for t in tools]
          assert 'get_catalog' in names, 'Missing get_catalog tool'
          assert 'place_order' in names, 'Missing place_order tool'
          assert 'check_order_status' in names, 'Missing check_order_status tool'
          print('MCP tools validated:', names)
          "
